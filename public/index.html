<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<meta name="theme-color" content="#1b3d2b">
	<meta name="description" content="Viridyan - a digital medicinal garden blending heritage, science, and immersive exploration.">
	<meta property="og:title" content="Viridyan - Digital Medicinal Garden">
	<meta property="og:description" content="Explore a living garden of medicinal plants with stories, science, and interactive discovery.">
	<meta property="og:type" content="website">
	<meta property="og:image" content="%PUBLIC_URL%/viridyan-logo.png">
	<meta property="og:image:alt" content="Viridyan leaf logo">
	<meta name="twitter:card" content="summary_large_image">
	<!--
      manifest.json provides metadata used when your web app is added to the
      homescreen on Android. See https://developers.google.com/web/fundamentals/engage-and-retain/web-app-manifest/
    -->
	<link rel="manifest" href="%PUBLIC_URL%/manifest.json">
	<link rel="icon" href="%PUBLIC_URL%/viridyan-logo.png">
	<link rel="apple-touch-icon" href="%PUBLIC_URL%/viridyan-logo.png">
	<!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
	<title>Viridyan - Digital Medicinal Garden</title>
	<style>
		#boot-screen {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: radial-gradient(circle at 30% 20%, rgba(90, 150, 110, 0.18), transparent 55%),
				radial-gradient(circle at 70% 80%, rgba(200, 170, 90, 0.12), transparent 50%),
				#f7f3ec;
			color: #1c2419;
			font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
			text-align: center;
			padding: 2rem;
		}
		#boot-card {
			background: rgba(255, 255, 255, 0.85);
			border: 1px solid #d4ddd1;
			border-radius: 16px;
			padding: 2.2rem 2rem;
			box-shadow: 0 18px 60px rgba(46, 72, 40, 0.18);
			max-width: 420px;
			width: 100%;
		}
		#boot-logo {
			width: 120px;
			height: 120px;
			margin: 0 auto 1rem;
			display: block;
		}
		#boot-title {
			font-size: 1.8rem;
			letter-spacing: 0.12em;
			color: #2e4828;
			margin-bottom: 0.4rem;
		}
		#boot-sub {
			font-size: 0.8rem;
			letter-spacing: 0.22em;
			text-transform: uppercase;
			color: #7a9b71;
			margin-bottom: 1rem;
		}
		#boot-copy {
			font-size: 0.95rem;
			line-height: 1.7;
			color: #6b4f3a;
		}
	</style>
</head>

<body>
	<noscript>
		You need to enable JavaScript to run this app.
	</noscript>
	<div id="root">
		<div id="boot-screen">
			<div id="boot-card">
				<img id="boot-logo" src="%PUBLIC_URL%/viridyan-logo.png" alt="Viridyan leaf logo">
				<div id="boot-title">VIRIDYAN</div>
				<div id="boot-sub">Digital Medicinal Garden</div>
				<div id="boot-copy">
					Explore a living library of medicinal plants with stories, science, and discovery.
				</div>
			</div>
		</div>
	</div>
	<!--
      This HTML file is a template.

      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
</body>

</html>
